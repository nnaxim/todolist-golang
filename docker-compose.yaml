services:
  golang-postgres:
    image: postgres:18-bookworm
    container_name: golang-env-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./out/pgdata:/var/lib/postgresql
    restart: always

  golang-postgres-migrate:
    image: migrate/migrate:v4.19.1
    volumes: 
      - ./migrations:/migrations


  port-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: todoapp-port-forwarder
    command: tcp-listen:5432,fork,reuseaddr tcp-connect:golang-postgres:5432
    ports:
      - "127.0.0.1:5432:5432"